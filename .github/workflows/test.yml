name: Test Project

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: React_App

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: React_App/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
